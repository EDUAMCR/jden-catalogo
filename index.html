<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDEN Catálogo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="dark-mode">

    <header class="topbar">
        <div class="brand">
            <img src="img/logo.png" alt="JDEN Logo">
            <span>JDEN Catálogo</span>
        </div>

        <div class="top-actions">
            <select id="filterSelect" class="filter-select">
                <option value="all">Vista completa</option>
                <option value="tequila">Tequila</option>
                <option value="whisky">Whisky</option>
                <option value="crema">Crema</option>
                <option value="licor">Licor</option>
                <option value="ron">Ron</option>
            </select>

            <button id="themeToggle" class="theme-toggle" title="Cambiar tema">
                ☀️
            </button>

            <a class="top-whatsapp" href="https://wa.me/+50689646176" target="_blank">
                <img src="img/wm-logo.jpg" alt="WhatsApp">
            </a>
        </div>
    </header>

    <section class="banner">
        <img src="img/banner.jpg" alt="Banner JDEN">
    </section>

    <main class="container">

        <section class="info-card">
            <div class="info-row">
                <div class="info-icon">i</div>
                <p class="info-title">
                    Observa las diferentes vistas para filtrar las bebidas según tu preferencia.
                </p>
            </div>
        </section>

        <section class="grid" id="productGrid"></section>

    </main>

    <script src="productos.js"></script>
    <script src="script.js"></script>

</body>

</html>
