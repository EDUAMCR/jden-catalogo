<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDEN Catálogo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="topbar">
        <div class="brand">
            <img src="img/logo.png" alt="JDEN Logo">
            <span>JDEN Catálogo</span>
        </div>

        <a class="top-whatsapp" href="https://wa.me/+50689646176" target="_blank">
            <img src="img/wm-logo.jpg" alt="WhatsApp">
        </a>
    </header>

    <section class="banner">
        <img src="img/banner.jpg" alt="Banner JDEN">
    </section>

    <main class="container">

        <section class="info-card">
            <div class="info-row">
                <div class="info-icon">i</div>
                <p class="info-title">
                    Observa las diferentes vistas para filtrar las bebidas según tu preferencia.
                </p>
            </div>
        </section>

        <section class="filter-card">
            <button onclick="filterProducts('all')">Vista completa</button>
            <button onclick="filterProducts('tequila')">Tequila</button>
            <button onclick="filterProducts('whisky')">Whisky</button>
            <button onclick="filterProducts('crema')">Crema</button>
            <button onclick="filterProducts('licor')">Licor</button>
            <button onclick="filterProducts('ron')">Ron</button>
        </section>

        <section class="grid" id="productGrid"></section>

    </main>

    <script src="productos.js"></script>
    <script src="script.js"></script>

</body>

</html>
